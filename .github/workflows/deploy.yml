name: Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'assets/**'
      - 'index.html'
      - 'index.dev.html'
      - 'favicon.svg'
      - '.nojekyll'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - name: Copy dist to root
        run: |
          cp dist/index.html index.html
          cp dist/favicon.svg favicon.svg
          mkdir -p assets
          cp -r dist/assets/* assets/
          touch .nojekyll

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html favicon.svg assets/ .nojekyll
          git diff --staged --quiet || (git commit -m "deploy: 更新构建产物" && git push origin main)
